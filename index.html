<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پارس‌تیوی | شبکه‌های فارسی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold2: #f0d080;
    --dark: #0a0a0f;
    --dark2: #111118;
    --dark3: #1a1a25;
    --dark4: #22222f;
    --text: #e8e0d0;
    --text2: #a09888;
    --red: #e03040;
    --live: #e03040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
  }

  .logo-text {
    font-size: 1.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 0.65rem;
    color: var(--text2);
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: -4px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(224,48,64,0.15);
    border: 1px solid rgba(224,48,64,0.3);
    border-radius: 50px;
    padding: 0.4rem 1rem;
    font-size: 0.8rem;
    color: var(--live);
    font-weight: 500;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--live);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* Main layout */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  /* Player Section */
  .player-section {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }

  @media (max-width: 900px) {
    .player-section { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  .player-wrap {
    background: var(--dark2);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(201,168,76,0.12);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .player-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    background: var(--dark3);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .now-playing {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .channel-logo-sm {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    background: var(--dark4);
    border: 1px solid rgba(201,168,76,0.2);
  }

  .channel-name-now {
    font-weight: 700;
    font-size: 1rem;
    color: var(--gold2);
  }

  .channel-desc-now {
    font-size: 0.75rem;
    color: var(--text2);
    margin-top: 2px;
  }

  #video-container {
    position: relative;
    background: #000;
    aspect-ratio: 16/9;
  }

  #player {
    width: 100%;
    height: 100%;
    display: block;
  }

  .player-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: linear-gradient(135deg, #0d0d18, #1a1525);
  }

  .play-icon-big {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  .play-icon-big:hover {
    transform: scale(1.08);
    box-shadow: 0 0 60px rgba(201,168,76,0.5);
  }

  .placeholder-text {
    color: var(--text2);
    font-size: 0.9rem;
    text-align: center;
  }

  .loading-bar {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
  }

  .loading-bar.active { display: block; }

  .loading-bar::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; bottom: 0;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: loading 1.5s infinite;
  }

  @keyframes loading {
    to { left: 100%; }
  }

  /* Sidebar */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--dark2);
    border-radius: 16px;
    border: 1px solid rgba(201,168,76,0.12);
    overflow: hidden;
  }

  .sidebar-header {
    padding: 1rem 1.25rem;
    background: var(--dark3);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .sidebar-list {
    overflow-y: auto;
    flex: 1;
    max-height: 400px;
  }

  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1.25rem;
    cursor: pointer;
    transition: background 0.2s;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .sidebar-item:hover { background: rgba(201,168,76,0.07); }
  .sidebar-item.active { background: rgba(201,168,76,0.12); border-right: 3px solid var(--gold); }

  .sidebar-ch-icon {
    width: 32px;
    height: 32px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    background: var(--dark4);
    border: 1px solid rgba(201,168,76,0.15);
    flex-shrink: 0;
  }

  .sidebar-ch-name {
    font-size: 0.85rem;
    font-weight: 600;
    flex: 1;
  }

  .sidebar-live {
    font-size: 0.6rem;
    color: var(--live);
    background: rgba(224,48,64,0.15);
    border: 1px solid rgba(224,48,64,0.25);
    border-radius: 4px;
    padding: 2px 5px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Channel Grid */
  .section-title {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .section-title h2 {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }

  .section-title .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
  }

  .category-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .cat-tab {
    padding: 0.5rem 1.25rem;
    border-radius: 50px;
    border: 1px solid rgba(201,168,76,0.2);
    background: transparent;
    color: var(--text2);
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .cat-tab:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .cat-tab.active {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-color: transparent;
    color: var(--dark);
    font-weight: 700;
  }

  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1rem;
  }

  .channel-card {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 14px;
    padding: 1.25rem 1rem;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .channel-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.05), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .channel-card:hover {
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(201,168,76,0.1);
  }

  .channel-card:hover::before { opacity: 1; }

  .channel-card.active {
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(201,168,76,0.2);
  }

  .card-icon {
    width: 60px;
    height: 60px;
    margin: 0 auto 0.75rem;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.15);
  }

  .card-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .card-cat {
    font-size: 0.7rem;
    color: var(--text2);
    font-weight: 300;
  }

  .card-live-badge {
    position: absolute;
    top: 0.6rem;
    left: 0.6rem;
    background: rgba(224,48,64,0.9);
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem;
    background: var(--dark3);
    border-top: 1px solid rgba(201,168,76,0.08);
    font-size: 0.75rem;
    color: var(--text2);
  }

  .status-ok { color: #4caf87; }
  .status-err { color: var(--red); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--text);
    padding: 0.75rem 1.5rem;
    border-radius: 50px;
    font-size: 0.85rem;
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* footer */
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--text2);
    font-size: 0.75rem;
    border-top: 1px solid rgba(201,168,76,0.08);
    margin-top: 3rem;
  }

  footer span {
    color: var(--gold);
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .channels-grid { animation: fadeIn 0.4s ease; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📺</div>
      <div>
        <div class="logo-text">پارس‌تیوی</div>
        <div class="logo-sub">شبکه‌های فارسی زنده</div>
      </div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      پخش زنده
    </div>
  </div>
</header>

<div class="container">

  <!-- Player + Sidebar -->
  <div class="player-section">
    <div class="player-wrap">
      <div class="player-header">
        <div class="now-playing" id="now-playing-info">
          <div class="channel-logo-sm" id="now-icon">📺</div>
          <div>
            <div class="channel-name-now" id="now-name">انتخاب کانال</div>
            <div class="channel-desc-now" id="now-desc">روی یک شبکه کلیک کنید</div>
          </div>
        </div>
        <div class="live-badge" id="live-indicator" style="display:none">
          <div class="live-dot"></div>
          زنده
        </div>
      </div>
      <div id="video-container">
        <div class="player-placeholder" id="placeholder">
          <div class="play-icon-big">▶</div>
          <div class="placeholder-text">یک شبکه از پایین انتخاب کنید</div>
        </div>
        <video id="player" controls style="display:none" autoplay></video>
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div class="status-bar">
        <span id="status-text">آماده</span>
        <span id="status-ch"></span>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">🔥 شبکه‌های پربازدید</div>
      <div class="sidebar-list" id="sidebar-list"></div>
    </div>
  </div>

  <!-- Channel Grid -->
  <div class="section-title">
    <h2>همه شبکه‌ها</h2>
    <div class="line"></div>
  </div>

  <div class="category-tabs" id="cat-tabs"></div>

  <div class="channels-grid" id="channels-grid"></div>

</div>

<footer>
  <span>پارس‌تیوی</span> — شبکه‌های فارسی زنده · تمامی حقوق محفوظ است
</footer>

<div class="toast" id="toast"></div>

<!-- HLS.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

<script>
const channels = [
  // ایران
  { id: 1, name: 'شبکه یک', cat: 'ایران', icon: '1️⃣', desc: 'شبکه اول سیما',
    url: 'https://irib-tv1-live.cdn.asset.aparat.com/aparat-video/irib_tv1_720.m3u8' },
  { id: 2, name: 'شبکه دو', cat: 'ایران', icon: '2️⃣', desc: 'شبکه دوم سیما',
    url: 'https://irib-tv2-live.cdn.asset.aparat.com/aparat-video/irib_tv2_720.m3u8' },
  { id: 3, name: 'شبکه سه', cat: 'ایران', icon: '3️⃣', desc: 'شبکه سوم سیما',
    url: 'https://irib-tv3-live.cdn.asset.aparat.com/aparat-video/irib_tv3_720.m3u8' },
  { id: 4, name: 'پرس‌تی‌وی', cat: 'ایران', icon: '🌐', desc: 'Press TV',
    url: 'https://presstv-live.cdn.asset.aparat.com/aparat-video/presstv_720.m3u8' },
  { id: 5, name: 'شبکه خبر', cat: 'ایران', icon: '📰', desc: 'اخبار ۲۴ ساعته',
    url: 'https://irib-khabar-live.cdn.asset.aparat.com/aparat-video/irib_khabar_720.m3u8' },
  { id: 6, name: 'آموزش', cat: 'ایران', icon: '📚', desc: 'شبکه آموزش',
    url: 'https://irib-amuzesh-live.cdn.asset.aparat.com/aparat-video/irib_amuzesh_720.m3u8' },
  { id: 7, name: 'افق', cat: 'ایران', icon: '🌅', desc: 'شبکه افق',
    url: 'https://irib-ofogh-live.cdn.asset.aparat.com/aparat-video/irib_ofogh_720.m3u8' },
  { id: 8, name: 'نسیم', cat: 'ایران', icon: '💨', desc: 'شبکه نسیم',
    url: 'https://irib-nasim-live.cdn.asset.aparat.com/aparat-video/irib_nasim_720.m3u8' },
  { id: 9, name: 'ورزش', cat: 'ایران', icon: '⚽', desc: 'شبکه ورزش',
    url: 'https://irib-varzesh-live.cdn.asset.aparat.com/aparat-video/irib_varzesh_720.m3u8' },
  { id: 10, name: 'تماشا', cat: 'ایران', icon: '🎬', desc: 'شبکه تماشا',
    url: 'https://irib-tamasha-live.cdn.asset.aparat.com/aparat-video/irib_tamasha_720.m3u8' },
  { id: 11, name: 'شبکه چهار', cat: 'ایران', icon: '4️⃣', desc: 'شبکه چهارم سیما',
    url: 'https://irib-tv4-live.cdn.asset.aparat.com/aparat-video/irib_tv4_720.m3u8' },
  { id: 12, name: 'مستند', cat: 'ایران', icon: '🎥', desc: 'شبکه مستند',
    url: 'https://irib-mostanad-live.cdn.asset.aparat.com/aparat-video/irib_mostanad_720.m3u8' },

  // ماهواره فارسی
  { id: 13, name: 'ایران اینترنشنال', cat: 'ماهواره', icon: '🌍', desc: 'Iran International',
    url: 'https://www.iranintl.com/live/hls/index.m3u8' },
  { id: 14, name: 'من‌وتو', cat: 'ماهواره', icon: '💜', desc: 'Manoto TV',
    url: 'https://live.manoto.tv/hls/manototv.m3u8' },
  { id: 15, name: 'VOA فارسی', cat: 'ماهواره', icon: '🗣️', desc: 'Voice of America',
    url: 'https://voa-live-apple-mediapackage.akamaized.net/out/v1/a72be2f0e5654a6785a08c42df0e6496/index.m3u8' },
  { id: 16, name: 'BBC فارسی', cat: 'ماهواره', icon: '🎙️', desc: 'BBC Persian',
    url: 'https://vs-cmaf-push-uk.live.fastly.net/x=4/i=urn:bbc:pips:service:bbc_persian_tv/pc_hd.m3u8' },
  { id: 17, name: 'رادیو فردا', cat: 'ماهواره', icon: '📻', desc: 'Radio Farda',
    url: 'https://radiofarda.com/live.m3u8' },

  // کردی
  { id: 18, name: 'روداو', cat: 'کردی', icon: '🟡', desc: 'Rudaw TV',
    url: 'https://rudawlive.net/smil:Rudaw1HD.smil/playlist.m3u8' },
  { id: 19, name: 'KurdSat', cat: 'کردی', icon: '⭐', desc: 'KurdSat TV',
    url: 'https://edge01.Ksat.me:443/kstv1/index.m3u8' },

  // افغانستان
  { id: 20, name: 'طلوع نیوز', cat: 'افغانستان', icon: '🌄', desc: 'Tolo News',
    url: 'https://tolonews.com/live.m3u8' },
  { id: 21, name: 'آریانا TV', cat: 'افغانستان', icon: '🏔️', desc: 'Ariana Television',
    url: 'https://live01.ariana.tv/hls/ariana.m3u8' },

  // تاجیکستان
  { id: 22, name: 'شبکه اول تاجیک', cat: 'تاجیکستان', icon: '🇹🇯', desc: 'Tajik TV1',
    url: 'https://live.trt.com.tr/tajik/hls/live.m3u8' },
];

const popularIds = [1, 2, 14, 13, 15, 16, 9, 5];

let currentId = null;
let hls = null;

// Build category tabs
const cats = ['همه', ...new Set(channels.map(c => c.cat))];
const tabsEl = document.getElementById('cat-tabs');
let activeCat = 'همه';

cats.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-tab' + (cat === activeCat ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    activeCat = cat;
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  };
  tabsEl.appendChild(btn);
});

// Sidebar
const sidebarEl = document.getElementById('sidebar-list');
popularIds.forEach(id => {
  const ch = channels.find(c => c.id === id);
  if (!ch) return;
  const div = document.createElement('div');
  div.className = 'sidebar-item';
  div.id = `sidebar-${ch.id}`;
  div.innerHTML = `
    <div class="sidebar-ch-icon">${ch.icon}</div>
    <div class="sidebar-ch-name">${ch.name}</div>
    <span class="sidebar-live">LIVE</span>
  `;
  div.onclick = () => playChannel(ch);
  sidebarEl.appendChild(div);
});

// Grid
function renderGrid() {
  const grid = document.getElementById('channels-grid');
  grid.innerHTML = '';
  const filtered = activeCat === 'همه' ? channels : channels.filter(c => c.cat === activeCat);
  filtered.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'channel-card' + (ch.id === currentId ? ' active' : '');
    card.id = `card-${ch.id}`;
    card.innerHTML = `
      <span class="card-live-badge">LIVE</span>
      <div class="card-icon">${ch.icon}</div>
      <div class="card-name">${ch.name}</div>
      <div class="card-cat">${ch.cat}</div>
    `;
    card.onclick = () => playChannel(ch);
    grid.appendChild(card);
  });
}

renderGrid();

// Play channel
function playChannel(ch) {
  currentId = ch.id;

  // Update UI
  document.getElementById('now-icon').textContent = ch.icon;
  document.getElementById('now-name').textContent = ch.name;
  document.getElementById('now-desc').textContent = ch.desc;
  document.getElementById('live-indicator').style.display = 'flex';
  document.getElementById('status-ch').textContent = ch.name;

  // Cards
  document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`card-${ch.id}`);
  if (card) card.classList.add('active');

  // Sidebar
  document.querySelectorAll('.sidebar-item').forEach(c => c.classList.remove('active'));
  const sItem = document.getElementById(`sidebar-${ch.id}`);
  if (sItem) sItem.classList.add('active');

  // Loading
  document.getElementById('placeholder').style.display = 'none';
  const video = document.getElementById('player');
  video.style.display = 'block';
  const loadBar = document.getElementById('loading-bar');
  loadBar.classList.add('active');
  setStatus('در حال بارگذاری...', '');

  // Destroy previous HLS
  if (hls) { hls.destroy(); hls = null; }

  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
    });
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
      loadBar.classList.remove('active');
      setStatus('✓ در حال پخش', 'status-ok');
      showToast(`📺 ${ch.name} — پخش زنده`);
    });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        loadBar.classList.remove('active');
        setStatus('⚠ خطا در اتصال', 'status-err');
        showToast('⚠ این کانال در حال حاضر در دسترس نیست');
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = ch.url;
    video.addEventListener('loadedmetadata', () => {
      video.play().catch(() => {});
      loadBar.classList.remove('active');
      setStatus('✓ در حال پخش', 'status-ok');
    });
  } else {
    setStatus('مرورگر پشتیبانی نمی‌کند', 'status-err');
    loadBar.classList.remove('active');
  }
}

function setStatus(text, cls) {
  const el = document.getElementById('status-text');
  el.textContent = text;
  el.className = cls || '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
