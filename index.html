<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishaq TV Ultra Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Vazirmatn',sans-serif;background:radial-gradient(circle at top,#111827,#0f172a,#020617);color:#fff;overflow-x:hidden;}
header{text-align:center;padding:35px;font-size:38px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,#00f5ff,#00ff9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:30px;padding:40px;max-width:1400px;margin:auto;}
.card{background:rgba(255,255,255,0.05);border-radius:30px;padding:25px;text-align:center;backdrop-filter:blur(25px);transition:0.4s;cursor:pointer;position:relative;overflow:hidden;}
.card:before{content:'';position:absolute;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(0,255,255,0.3),transparent);top:-50%;left:-50%;transform:rotate(25deg);transition:0.7s;}
.card:hover:before{left:100%;}
.card:hover{transform:translateY(-12px) scale(1.05);box-shadow:0 0 35px rgba(0,255,255,0.6);}
.card img{width:100%;height:120px;object-fit:contain;margin-bottom:15px;filter:drop-shadow(0 0 10px rgba(0,255,255,0.6));}
.card span{font-size:20px;font-weight:700;}
#playerPage{display:none;text-align:center;padding:30px;animation:fadeIn 0.5s ease-in-out;position:relative;}
.videoWrapper{position:relative;display:inline-block;}
video{width:95%;max-width:1200px;border-radius:30px;box-shadow:0 0 60px rgba(0,0,0,0.4);display:block;}
#overlayLogo{position:absolute;bottom:15px;left:15px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.5);padding:10px 15px;border-radius:20px;font-weight:700;font-size:18px;color:#00ffcc;backdrop-filter:blur(5px);z-index:10;}
#overlayLogo img{width:40px;height:40px;object-fit:contain;border-radius:50%;}
button{margin-top:25px;padding:14px 30px;border:none;border-radius:40px;font-size:17px;font-weight:bold;cursor:pointer;background:linear-gradient(90deg,#00f5ff,#00ff9d);color:#000;transition:0.3s;}
button:hover{transform:scale(1.1);box-shadow:0 0 25px #00ffcc;}
#qualitySelector{margin-top:15px;padding:10px 15px;font-size:16px;border-radius:20px;border:none;cursor:pointer;}
@keyframes fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
footer{text-align:center;padding:30px;opacity:0.4;font-size:14px;}
</style>
</head>
<body>

<header>🔥 Ishaq TV 🔥</header>

<div id="homePage">
<div class="grid" id="channelGrid"></div>
</div>

<div id="playerPage">
<h2 id="channelTitle"></h2>
<div id="loading">⏳ در حال بارگذاری...</div>
<video id="video" controls playsinline></video>
<br>
<button onclick="goBack()">🔙 بازگشت</button>
</div>

<script>
let hls;
let player;
let currentSourceIndex = 0;

/* =======================
   📡 همه کانال‌ها
======================= */
const channels = {

  tolo: {
    name: "طلوع",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993521-914660414.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/tolo/playlist.m3u8"
    ]
  },

  irib3: {
    name: "شبکه سه",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993719-124056621.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/irib3/playlist.m3u8"
    ]
  },

  varzesh: {
    name: "ورزش",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993702-549827287.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/varzesh/playlist.m3u8"
    ]
  },

  persiana: {
    name: "پرشیا اسپورت",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993686-807307490.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/persiana/playlist.m3u8"
    ]
  },

  persiana2: {
    name: "پرشیا اسپورت 2",
    logo: "https://cdn1.movieland.af/images/channels-logos/1763529079539-200808624.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/persiana2/playlist.m3u8"
    ]
  },

  solh: {
    name: "صلح اسپورت",
    logo: "https://cdn1.movieland.af/images/channels-logos/1769243953209-579707064.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/solh/playlist.m3u8"
    ]
  },

  sportsaf: {
    name: "Sports AF",
    logo: "https://cdn1.movieland.af/images/channels-logos/1768027145119-177342014.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/sportsaf/playlist.m3u8"
    ]
  },

  arezo: {
    name: "آرزو",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993620-281627637.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/arezo/playlist.m3u8"
    ]
  },

  ariana: {
    name: "آریانا",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993561-302702845.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/ariana/playlist.m3u8"
    ]
  },

  meraj: {
    name: "معراج",
    logo: "https://cdn1.movieland.af/images/channels-logos/1769234333004-354961839.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/meraj/playlist.m3u8"
    ]
  }

};

/* =======================
   🧱 ساخت کارت‌ها
======================= */
const grid = document.getElementById("channelGrid");

for(let key in channels){
  const ch = channels[key];

  const div = document.createElement("div");
  div.className = "card";
  div.onclick = () => openChannel(key);

  div.innerHTML = `
    <img src="${ch.logo}">
    <span>${ch.name}</span>
  `;

  grid.appendChild(div);
}

/* =======================
   ▶️ باز کردن کانال
======================= */
function openChannel(key){
  const ch = channels[key];

  document.getElementById("channelTitle").innerText = ch.name;
  document.getElementById("homePage").style.display="none";
  document.getElementById("playerPage").style.display="block";

  currentSourceIndex = 0;
  loadStream(ch.sources);
}

/* =======================
   🎬 پخش استریم با fallback
======================= */
function loadStream(sources){
  const video = document.getElementById("video");
  document.getElementById("loading").style.display="block";

  if(hls) hls.destroy();

  function tryNext(){
    if(currentSourceIndex >= sources.length){
      alert("❌ هیچ استریمی کار نمی‌کند");
      return;
    }

    const url = sources[currentSourceIndex];

    if(Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        document.getElementById("loading").style.display="none";

        const levels = hls.levels;

        const qualities = levels
          .map(l => l.height)
          .filter(q => q === 720 || q === 1080);

        player = new Plyr(video, {
          settings: ['quality','speed','fullscreen'],
          quality: {
            default: qualities.includes(720) ? 720 : qualities[0],
            options: qualities,
            forced: true,
            onChange: (q) => {
              const index = levels.findIndex(l => l.height === q);
              hls.currentLevel = index;
            }
          }
        });

        video.play();
      });

      hls.on(Hls.Events.ERROR, function(event, data){
        if(data.fatal){
          currentSourceIndex++;
          tryNext();
        }
      });

    } else {
      video.src = url;
      video.play();
    }
  }

  tryNext();
}

/* =======================
   🔙 برگشت
======================= */
function goBack(){
  if(hls) hls.destroy();
  document.getElementById("playerPage").style.display="none";
  document.getElementById("homePage").style.display="block";
}
</script>

</body>
</html>
