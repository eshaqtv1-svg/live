<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishaq TV Ultra Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Vazirmatn';background:#020617;color:#fff}
header{text-align:center;padding:25px;font-size:32px;font-weight:900;color:#00ffcc}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
max-width:1300px;
margin:auto;
}

.card{
background:#111827;
border-radius:20px;
padding:20px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
background:#1f2937;
}

.card img{
width:100%;
height:100px;
object-fit:contain;
margin-bottom:10px;
}

#playerPage {
  position: fixed;    /* قرار گرفتن روی کل صفحه */
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 999;
  display: none;
  text-align: center;
  padding: 10px;
}

#loading{
display:none;
margin-top:20px;
}

video, .plyr {
  width: 100%;       /* پهنای کامل صفحه */
  height: 100%;      /* ارتفاع کامل صفحه */
}
plyr__video-wrapper {
  border-radius: 20px;
  overflow: hidden;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#00ffcc;
color:#000;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<header>🔥 Ishaq TV 🔥</header>

<div id="homePage">
<div class="grid" id="channelGrid"></div>
</div>

<div id="playerPage">
<h2 id="channelTitle"></h2>
<div id="loading">⏳ در حال بارگذاری...</div>
<video id="video" controls playsinline></video>
<br>
<button onclick="goBack()">🔙 بازگشت</button>
</div>

<script>
let hls;
let player;
let currentSourceIndex = 0;

/* =======================
   📡 همه کانال‌ها
======================= */
const channels = {

  tolo: {
    name: "طلوع",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993521-914660414.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/tolo/playlist.m3u8"
    ]
  },

  irib3: {
    name: "شبکه سه",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993719-124056621.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/irib3/playlist.m3u8"
    ]
  },

  varzesh: {
    name: "ورزش",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993702-549827287.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/varzesh/playlist.m3u8"
    ]
  },

  persiana: {
    name: "پرشیا اسپورت",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993686-807307490.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/persiana/playlist.m3u8"
    ]
  },

  persiana2: {
    name: "پرشیا اسپورت 2",
    logo: "https://cdn1.movieland.af/images/channels-logos/1763529079539-200808624.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/persiana2/playlist.m3u8"
    ]
  },

  solh: {
    name: "صلح اسپورت",
    logo: "https://cdn1.movieland.af/images/channels-logos/1769243953209-579707064.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/solh/playlist.m3u8"
    ]
  },

  sportsaf: {
    name: "Sports AF",
    logo: "https://cdn1.movieland.af/images/channels-logos/1768027145119-177342014.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/sportsaf/playlist.m3u8"
    ]
  },

  arezo: {
    name: "آرزو",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993620-281627637.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/arezo/playlist.m3u8"
    ]
  },

  ariana: {
    name: "آریانا",
    logo: "https://cdn1.movieland.af/images/channel-logos/1760950993561-302702845.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/ariana/playlist.m3u8"
    ]
  },

  meraj: {
    name: "معراج",
    logo: "https://cdn1.movieland.af/images/channels-logos/1769234333004-354961839.svg",
    sources: [
      "https://ishaq-proxy.eshaqtv1.workers.dev/meraj/playlist.m3u8"
    ]
  }

};

/* =======================
   🧱 ساخت کارت‌ها
======================= */
const grid = document.getElementById("channelGrid");

for(let key in channels){
  const ch = channels[key];

  const div = document.createElement("div");
  div.className = "card";
  div.onclick = () => openChannel(key);

  div.innerHTML = `
    <img src="${ch.logo}">
    <span>${ch.name}</span>
  `;

  grid.appendChild(div);
}

/* =======================
   ▶️ باز کردن کانال
======================= */
function openChannel(key){
  const ch = channels[key];

  document.getElementById("channelTitle").innerText = ch.name;
  document.getElementById("homePage").style.display="none";
  document.getElementById("playerPage").style.display="block";

  currentSourceIndex = 0;
  loadStream(ch.sources);
}

/* =======================
   🎬 پخش استریم با fallback
======================= */
function loadStream(sources){
  const video = document.getElementById("video");
  document.getElementById("loading").style.display="block";

  if(hls) hls.destroy();

  function tryNext(){
    if(currentSourceIndex >= sources.length){
      alert("❌ هیچ استریمی کار نمی‌کند");
      return;
    }

    const url = sources[currentSourceIndex];

    if(Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        document.getElementById("loading").style.display="none";

        const levels = hls.levels;

        const qualities = levels
          .map(l => l.height)
          .filter(q => q === 720 || q === 1080);

        player = new Plyr(video, {
          settings: ['quality','speed','fullscreen'],
          quality: {
            default: qualities.includes(720) ? 720 : qualities[0],
            options: qualities,
            forced: true,
            onChange: (q) => {
              const index = levels.findIndex(l => l.height === q);
              hls.currentLevel = index;
            }
          }
        });

        video.play();
      });

      hls.on(Hls.Events.ERROR, function(event, data){
        if(data.fatal){
          currentSourceIndex++;
          tryNext();
        }
      });

    } else {
      video.src = url;
      video.play();
    }
  }

  tryNext();
}

/* =======================
   🔙 برگشت
======================= */
function goBack(){
  if(hls) hls.destroy();
  document.getElementById("playerPage").style.display="none";
  document.getElementById("homePage").style.display="block";
}
</script>

</body>
</html>
