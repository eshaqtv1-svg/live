<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تلویزیون فارسی | Persian TV Live</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --card: #1a1a2e;
    --border: #252540;
    --accent: #e63946;
    --accent2: #f4a261;
    --gold: #ffd700;
    --text: #f0f0f5;
    --muted: #8888aa;
    --live: #00d26a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(230,57,70,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(244,162,97,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,18,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--accent);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,210,106,0.1);
    border: 1px solid rgba(0,210,106,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    color: var(--live);
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: var(--live);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .search-bar {
    flex: 1;
    max-width: 320px;
    position: relative;
    margin: 0 auto;
  }

  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px 8px 40px;
    color: var(--text);
    font-family: 'Vazirmatn', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    text-align: right;
  }

  .search-bar input:focus { border-color: var(--accent); }

  .search-bar::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.5;
  }

  /* Categories */
  .categories {
    position: sticky;
    top: 64px;
    z-index: 90;
    background: rgba(10,10,18,0.88);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .cats-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding: 12px 0;
    scrollbar-width: none;
  }

  .cats-inner::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    padding: 6px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Vazirmatn', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .cat-btn:hover { border-color: var(--accent); color: var(--text); }

  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  /* Main */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
    position: relative;
    z-index: 1;
  }

  /* Featured Player */
  .featured {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    margin-bottom: 40px;
  }

  @media (max-width: 900px) {
    .featured { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  .player-wrap {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .player-area {
    position: relative;
    padding-bottom: 56.25%;
    background: #000;
  }

  .player-area iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .player-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: radial-gradient(ellipse at center, #1a1a2e, #0a0a12);
  }

  .play-icon {
    width: 72px;
    height: 72px;
    background: rgba(230,57,70,0.2);
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .play-icon:hover {
    background: var(--accent);
    transform: scale(1.08);
  }

  .player-info {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .channel-now {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ch-logo-big {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .ch-logo-big img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .ch-name-big { font-size: 16px; font-weight: 700; }
  .ch-program { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .live-tag {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--accent);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }

  /* Sidebar */
  .sidebar {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-list {
    overflow-y: auto;
    flex: 1;
    max-height: 360px;
  }

  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(37,37,64,0.5);
  }

  .sidebar-item:hover { background: rgba(255,255,255,0.04); }
  .sidebar-item.active { background: rgba(230,57,70,0.1); }

  .s-logo {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .s-logo img { width: 100%; height: 100%; object-fit: cover; }

  .s-info { flex: 1; min-width: 0; }
  .s-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .s-prog { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .s-live { width: 7px; height: 7px; background: var(--live); border-radius: 50%; flex-shrink: 0; animation: pulse 1.5s ease-in-out infinite; }

  /* Section Title */
  .section-title {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::before {
    content: '';
    display: block;
    width: 4px;
    height: 22px;
    background: linear-gradient(to bottom, var(--accent), var(--accent2));
    border-radius: 4px;
  }

  /* Channel Grid */
  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .ch-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .ch-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  .ch-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(230,57,70,0.3);
  }

  .ch-thumb {
    height: 110px;
    background: linear-gradient(135deg, var(--surface), var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .ch-thumb-logo {
    font-size: 48px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }

  .ch-thumb img {
    width: 80px;
    height: 80px;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .ch-thumb-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(26,26,46,0.8), transparent);
  }

  .ch-live-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--accent);
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .ch-live-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    background: #fff;
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .ch-body { padding: 12px 14px; }
  .ch-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .ch-prog-name { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  .modal-overlay.hidden { display: none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 820px;
    overflow: hidden;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes slideUp {
    from { transform: translateY(40px) scale(0.96); opacity: 0; }
    to { transform: none; opacity: 1; }
  }

  .modal-player { position: relative; padding-bottom: 56.25%; background: #000; }
  .modal-player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

  .modal-info {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .modal-ch-info { display: flex; align-items: center; gap: 12px; }
  .modal-logo { width: 52px; height: 52px; border-radius: 12px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid var(--border); overflow: hidden; }
  .modal-logo img { width: 100%; height: 100%; object-fit: cover; }
  .modal-ch-name { font-size: 18px; font-weight: 800; }
  .modal-ch-prog { font-size: 13px; color: var(--muted); margin-top: 3px; }

  .modal-close {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    color: var(--text);
    font-family: 'Vazirmatn', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }

  .modal-close:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-top: 20px;
    position: relative;
    z-index: 1;
  }

  /* Shimmer effect for cards */
  .ch-card::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
    transition: left 0.6s;
  }

  .ch-card:hover::after { left: 150%; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  @media (max-width: 600px) {
    main { padding: 20px 14px; }
    .channels-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .header-inner { gap: 10px; }
    .search-bar { max-width: 180px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-icon">📺</div>
      <div class="logo-text">فارسی<span>TV</span></div>
    </a>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="جستجوی کانال..." oninput="filterChannels()">
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      پخش زنده
    </div>
  </div>
</header>

<div class="categories">
  <div class="cats-inner">
    <button class="cat-btn active" onclick="filterCat(this,'all')">همه کانال‌ها</button>
    <button class="cat-btn" onclick="filterCat(this,'news')">خبری</button>
    <button class="cat-btn" onclick="filterCat(this,'entertainment')">سرگرمی</button>
    <button class="cat-btn" onclick="filterCat(this,'series')">سریال و فیلم</button>
    <button class="cat-btn" onclick="filterCat(this,'music')">موسیقی</button>
    <button class="cat-btn" onclick="filterCat(this,'children')">کودک</button>
    <button class="cat-btn" onclick="filterCat(this,'sport')">ورزشی</button>
    <button class="cat-btn" onclick="filterCat(this,'religious')">مذهبی</button>
  </div>
</div>

<main>
  <!-- Featured Player -->
  <div class="featured">
    <div class="player-wrap">
      <div class="player-area" id="mainPlayerArea">
        <div class="player-placeholder" id="playerPlaceholder">
          <div class="play-icon" onclick="playFeatured()">▶</div>
          <div style="font-size:16px;font-weight:700;">برای پخش کلیک کنید</div>
          <div style="font-size:13px;color:var(--muted);">کانال منتخب: من و تو</div>
        </div>
        <iframe id="mainIframe" style="display:none" allowfullscreen allow="autoplay"></iframe>
      </div>
      <div class="player-info">
        <div class="channel-now">
          <div class="ch-logo-big"><span id="featuredEmoji">📺</span></div>
          <div>
            <div class="ch-name-big" id="featuredName">من و تو</div>
            <div class="ch-program" id="featuredProg">در حال پخش زنده</div>
          </div>
        </div>
        <div class="live-tag">
          <div class="live-dot" style="background:#fff"></div>
          زنده
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">📋 کانال‌های محبوب</div>
      <div class="sidebar-list" id="sidebarList"></div>
    </div>
  </div>

  <!-- All Channels -->
  <div class="section-title" id="gridTitle">تمام کانال‌های فارسی</div>
  <div class="channels-grid" id="channelsGrid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-player">
      <iframe id="modalIframe" allowfullscreen allow="autoplay"></iframe>
    </div>
    <div class="modal-info">
      <div class="modal-ch-info">
        <div class="modal-logo" id="modalLogo"></div>
        <div>
          <div class="modal-ch-name" id="modalName"></div>
          <div class="modal-ch-prog" id="modalProg"></div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModalBtn()">✕ بستن</button>
    </div>
  </div>
</div>

<footer>
  <p>📺 تمامی کانال‌های فارسی به صورت زنده | © ۱۴۰۴</p>
  <p style="margin-top:6px;font-size:11px;">پخش زنده شبکه‌های ماهواره‌ای و اینترنتی فارسی زبان</p>
</footer>

let currentCat = 'all';
let currentSearch = '';
let featuredChannel = realStreams[1];

function getFiltered() {
  return realStreams.filter(ch => {
    const matchCat = currentCat === 'all' || ch.cat === currentCat;
    const matchSearch = ch.name.includes(currentSearch) || ch.prog.includes(currentSearch);
    return matchCat && matchSearch;
  });
}

function renderGrid() {
  const grid = document.getElementById('channelsGrid');
  const filtered = getFiltered();
  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px">کانالی یافت نشد</div>';
    return;
  }
  grid.innerHTML = filtered.map(ch => `
    <div class="ch-card ${featuredChannel.id === ch.id ? 'active' : ''}" onclick="selectChannel(${ch.id})">
      <div class="ch-thumb" style="background:linear-gradient(135deg,#1a1a2e,#0a0a12)">
        <div class="ch-thumb-logo">${ch.emoji}</div>
        <div class="ch-thumb-overlay"></div>
        <div class="ch-live-badge">زنده</div>
      </div>
      <div class="ch-body">
        <div class="ch-title">${ch.name}</div>
        <div class="ch-prog-name">${ch.prog}</div>
      </div>
    </div>
  `).join('');
}

function renderSidebar() {
  const top = realStreams.slice(0,10);
  document.getElementById('sidebarList').innerHTML = top.map(ch => `
    <div class="sidebar-item ${featuredChannel.id === ch.id ? 'active' : ''}" onclick="selectChannel(${ch.id})">
      <div class="s-logo">${ch.emoji}</div>
      <div class="s-info">
        <div class="s-name">${ch.name}</div>
        <div class="s-prog">${ch.prog}</div>
      </div>
      <div class="s-live"></div>
    </div>
  `).join('');
}

function selectChannel(id) {
  const ch = realStreams.find(c => c.id === id);
  if (!ch) return;
  featuredChannel = ch;

  // Update featured player
  document.getElementById('featuredEmoji').textContent = ch.emoji;
  document.getElementById('featuredName').textContent = ch.name;
  document.getElementById('featuredProg').textContent = ch.prog;

  // Hide placeholder, load iframe
  const placeholder = document.getElementById('playerPlaceholder');
  const iframe = document.getElementById('mainIframe');
  placeholder.style.display = 'none';
  iframe.style.display = 'block';
  iframe.src = ch.src + '&autoplay=1';

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });

  renderGrid();
  renderSidebar();
}

function playFeatured() {
  selectChannel(featuredChannel.id);
}

function openModal(id) {
  const ch = realStreams.find(c => c.id === id);
  if (!ch) return;
  document.getElementById('modalLogo').textContent = ch.emoji;
  document.getElementById('modalName').textContent = ch.name;
  document.getElementById('modalProg').textContent = ch.prog;
  document.getElementById('modalIframe').src = ch.src + '&autoplay=1';
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  document.getElementById('modalOverlay').classList.add('hidden');
  document.getElementById('modalIframe').src = '';
  document.body.style.overflow = '';
}

function closeModalBtn() {
  closeModal();
}

function filterCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  renderGrid();
}
