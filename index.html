<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishaq Premium IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f0f14,#1c1c26);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

header{
  padding:25px 50px;
  font-size:26px;
  font-weight:700;
  letter-spacing:2px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.section{
  padding:40px 50px 60px 50px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:45px 20px;
  text-align:center;
  font-size:18px;
  cursor:pointer;
  transition:0.35s ease;
  border:1px solid rgba(255,255,255,0.07);
  backdrop-filter:blur(10px);
}

.card:hover{
  transform:translateY(-12px) scale(1.06);
  background:rgba(229,9,20,0.18);
  border:1px solid #e50914;
  box-shadow:0 20px 45px rgba(229,9,20,0.5);
  color:#e50914;
}

#playerModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#playerBox{
  width:90%;
  max-width:1000px;
  background:#000;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 60px rgba(229,9,20,0.6);
  position:relative;
}

video{
  width:100%;
  height:auto;
  display:block;
}

.closeBtn{
  position:absolute;
  top:10px;
  right:15px;
  font-size:28px;
  cursor:pointer;
  color:#fff;
}

@media(max-width:768px){
  header{padding:20px;font-size:20px}
  .section{padding:20px}
}
</style>
</head>

<body>

<header>Ishaq Premium IPTV</header>

<div class="section">
<div class="grid">

<div class="card" onclick="playStream('tolo')">طلوع</div>
<div class="card" onclick="playStream('varzesh')">ورزش</div>
<div class="card" onclick="playStream('irib3')">شبکه سه</div>
<div class="card" onclick="playStream('persiana')">پرشیا اسپورت</div>
<div class="card" onclick="playStream('solh')">صلح اسپورت</div>
<div class="card" onclick="playStream('ariana')">آریانا</div>
<div class="card" onclick="playStream('arezo')">آرزو</div>
<div class="card" onclick="playStream('meraj')">معراج</div>
<div class="card" onclick="playStream('persiana2')">پرشیا اسپورت 2</div>

</div>
</div>

<div id="playerModal">
  <div id="playerBox">
    <span class="closeBtn" onclick="closePlayer()">✕</span>
    <video id="video" controls autoplay></video>
  </div>
</div>

<script>
const base = "https://ishaq-proxy.eshaqtv1.workers.dev/";

function playStream(channel){
  const video = document.getElementById("video");
  const modal = document.getElementById("playerModal");
  const streamUrl = base + channel + "/chunklist0.m3u8";

  modal.style.display = "flex";

  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(streamUrl);
    hls.attachMedia(video);
  } else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = streamUrl;
  }
}

function closePlayer(){
  const modal = document.getElementById("playerModal");
  const video = document.getElementById("video");
  video.pause();
  video.src="";
  modal.style.display="none";
}
</script>

</body>
</html>
